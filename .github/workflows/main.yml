name: XServer-Game-Renew

on:
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 拉取本库脚本
        uses: actions/checkout@v4

      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py xserver_game_renew.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 sing-box 代理转发
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "ℹ️ 未设置 PROXY_URL，跳过 sing-box 代理启动。"
            exit 0
          fi

          echo "📦 使用固定版本 sing-box（避免每次请求 GitHub API 被限流）..."
          SB_VERSION="1.11.15"
          echo "📦 sing-box 版本: $SB_VERSION"

          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)
              SB_ARCH="amd64"
              ;;
            aarch64|arm64)
              SB_ARCH="arm64"
              ;;
            *)
              echo "❌ 不支持的系统架构: $ARCH"
              exit 1
              ;;
          esac

          SB_FILE="sing-box-${SB_VERSION}-linux-${SB_ARCH}.tar.gz"
          SB_DIR="sing-box-${SB_VERSION}-linux-${SB_ARCH}"

          curl -fL --retry 3 \
            -o "$SB_FILE" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/${SB_FILE}"

          tar -xzf "$SB_FILE"
          cp "${SB_DIR}/sing-box" ./sing-box
          chmod +x ./sing-box

          echo "🔧 解析代理链接，生成 sing-box 配置..."
          python3 linktosb.py "$PROXY_URL" -o singbox.json --port 8080

          echo "🔍 检查 sing-box 配置..."
          if ! ./sing-box check -c singbox.json; then
            echo "❌ sing-box 配置检查失败，当前配置如下："
            cat singbox.json
            exit 1
          fi

          echo "🚀 启动 sing-box..."
          nohup ./sing-box run -c singbox.json > singbox.log 2>&1 &
          SB_PID=$!

          sleep 3

          if ! kill -0 "$SB_PID" 2>/dev/null; then
            echo "❌ sing-box 启动后异常退出，日志如下："
            cat singbox.log
            exit 1
          fi

          echo "✅ sing-box 已启动，测试代理连通性..."

          # curl 放进 if 判断中，可避免 set -e 在 curl 失败时提前中断步骤。
          if CURL_OUT=$(curl -sS -m 12 \
            --proxy http://127.0.0.1:8080 \
            https://api.ipify.org); then

            if [ -z "$CURL_OUT" ]; then
              echo "❌ 代理连接成功，但出口 IP 接口未返回内容。"
              echo "----- sing-box 日志 -----"
              cat singbox.log
              exit 1
            fi

            MASKED_IP=$(echo "$CURL_OUT" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)\.[0-9]+/\1.**/')
            echo "✅ 代理出口 IP（已脱敏）：$MASKED_IP"
          else
            CURL_STATUS=$?
            echo "❌ sing-box 代理连通性测试失败，curl exit code: $CURL_STATUS"
            echo "----- sing-box 日志 -----"
            cat singbox.log
            exit 1
          fi

      - name: 🔧 执行续期
        id: renew
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSERVER_GAME_ACCOUNT }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          TG_BOT: ${{ secrets.TG_BOT }}
          SINGBOX_LOG_PATH: singbox.log
        run: python3 xserver_game_renew.py

      - name: 📨 工作流级失败兜底通知
        if: failure() && steps.renew.outcome != 'failure'
        env:
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          if [ -z "$TG_BOT" ]; then
            echo "ℹ️ 未设置 TG_BOT，跳过兜底通知。"
            exit 0
          fi

          CHAT_ID="${TG_BOT%%,*}"
          BOT_TOKEN="${TG_BOT#*,}"
          RUN_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S (北京时间)')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MSG=$(printf '%s\n%s\n%s\n%s\n%s' \
            "🎮 XServer Game 续期通知" \
            "🕐 运行时间: ${RUN_TIME}" \
            "🖥 服务器: XServer Game 🇯🇵" \
            "📊 续期结果: ❌ 续期失败！" \
            "📝 原因: 在续期脚本运行之前（如 sing-box 代理启动阶段）就已失败，脚本内部的通知逻辑没机会执行，此为工作流级别兜底通知。详细原因请查看 Actions 日志：${RUN_URL}")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null || true
